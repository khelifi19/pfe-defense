<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predictive AIOps — Yassine Khelifi · PFE Defense 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #002A54; --navy-deep: #001A38; --navy-soft: #0a3d6b;
  --green: #00A550; --green-deep: #007a3a; --green-soft: #34c77a;
  --bg: #F4F7F6; --bg-dark: #001626;
  --ink: #0d1b2a; --ink-soft: #3a4a5c; --ink-muted: #6b7a8c;
  --line: #d8e0e6; --line-soft: #e8edf1;
  --amber: #E89923; --amber-glow: #FFB444;
  --crimson: #C0392B; --violet: #6B46C1;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --font-serif: 'Playfair Display', Georgia, serif;
  --shadow-md: 0 4px 16px rgba(0,42,84,0.08);
  --shadow-lg: 0 16px 48px rgba(0,42,84,0.12);
  --shadow-xl: 0 30px 80px rgba(0,42,84,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font-sans); background: var(--bg); color: var(--ink); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh; width: 100vw; cursor: none; }
#root { width: 100vw; height: 100vh; position: relative; }

/* ========== CURSOR ========== */
.cursor-dot { position: fixed; width: 8px; height: 8px; background: var(--green); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.15s, height 0.15s; mix-blend-mode: difference; }
.cursor-ring { position: fixed; width: 36px; height: 36px; border: 1.5px solid var(--green); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: width 0.25s, height 0.25s; }
.cursor-ring.hover { width: 60px; height: 60px; background: rgba(0,165,80,0.1); border-width: 2px; }
.cursor-dot.hover { width: 0; height: 0; }
@media (hover: none) { .cursor-dot, .cursor-ring { display: none; } html, body { cursor: auto; } }

/* ========== DECK ========== */
.deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.slide { position: absolute; inset: 0; opacity: 0; visibility: hidden; transition: opacity 0.55s ease, visibility 0s linear 0.55s; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.slide.active { opacity: 1; visibility: visible; z-index: 5; transition: opacity 0.55s ease, visibility 0s linear 0s; }
.slide-inner { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 90px 60px 110px; position: relative; }
/* For tall content, allow flex-start alignment */
.slide-inner.tall { align-items: flex-start; padding-top: 100px; }

/* ========== TOPBAR ========== */
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 99; display: flex; align-items: center; justify-content: flex-end; padding: 24px 28px; background: transparent; pointer-events: none; transition: background 0.4s; }
.topbar-brand { display: none; }
.topbar-meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); letter-spacing: 0.15em; text-transform: uppercase; pointer-events: none; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line); animation: badgeSlideIn 0.6s 0.2s cubic-bezier(0.4, 0, 0.2, 1) both; }
.topbar.dark .topbar-meta { background: rgba(0,22,38,0.7); color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.1); }
.brand-mark { display: none; }

/* ============================================================
   ENHANCED NAVIGATION & SLIDE COUNTER (v15+)
   ============================================================ */

/* Big visible slide counter badge — top-left corner */
.slide-counter-badge {
  position: fixed;
  top: 24px;
  left: 24px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 10px 18px 10px 10px;
  border-radius: 14px;
  border: 1px solid var(--line);
  box-shadow: 0 4px 24px rgba(0, 42, 84, 0.08);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  animation: badgeSlideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.slide-counter-badge.dark {
  background: rgba(0, 22, 38, 0.85);
  border-color: rgba(255, 255, 255, 0.15);
}
@keyframes badgeSlideIn {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
.counter-num {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 26px;
  line-height: 1;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--navy) 0%, var(--green) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background-color: rgba(0, 165, 80, 0.08);
  border: 1.5px solid rgba(0, 165, 80, 0.2);
}
.slide-counter-badge.dark .counter-num {
  background: linear-gradient(135deg, #fff 0%, var(--green-soft) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  background-color: rgba(52, 199, 122, 0.1);
  border-color: rgba(52, 199, 122, 0.3);
}
.counter-divider {
  width: 1px;
  height: 36px;
  background: var(--line);
}
.slide-counter-badge.dark .counter-divider {
  background: rgba(255, 255, 255, 0.15);
}
.counter-info { display: flex; flex-direction: column; gap: 2px; }
.counter-of {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 600;
}
.slide-counter-badge.dark .counter-of { color: rgba(255, 255, 255, 0.55); }
.counter-of strong { color: var(--navy); font-weight: 700; }
.slide-counter-badge.dark .counter-of strong { color: #fff; }
.counter-chapter {
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.1;
}
.slide-counter-badge.dark .counter-chapter { color: #fff; }

/* Enhanced progress track (thicker, more visible) */
.progress-track {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: rgba(0, 42, 84, 0.06);
  z-index: 99;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--navy) 0%, var(--green) 50%, var(--green-soft) 100%);
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 12px rgba(0, 165, 80, 0.5);
  position: relative;
  overflow: hidden;
}
.progress-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: -50%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
  animation: progressShine 2.5s ease-in-out infinite;
}
@keyframes progressShine {
  to { left: 150%; }
}

/* Floating background particles */
.particle-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--green);
  border-radius: 50%;
  opacity: 0.15;
  animation: particleFloat 20s linear infinite;
}
.particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 18s; }
.particle:nth-child(2) { left: 25%; animation-delay: -5s; animation-duration: 22s; background: var(--navy); }
.particle:nth-child(3) { left: 40%; animation-delay: -10s; animation-duration: 24s; }
.particle:nth-child(4) { left: 55%; animation-delay: -3s; animation-duration: 20s; background: var(--violet); }
.particle:nth-child(5) { left: 70%; animation-delay: -15s; animation-duration: 26s; }
.particle:nth-child(6) { left: 85%; animation-delay: -8s; animation-duration: 19s; background: var(--amber); }
.particle:nth-child(7) { left: 5%; animation-delay: -12s; animation-duration: 23s; background: var(--navy); }
.particle:nth-child(8) { left: 60%; animation-delay: -18s; animation-duration: 21s; }
@keyframes particleFloat {
  from { transform: translateY(110vh) scale(0); opacity: 0; }
  10% { opacity: 0.2; }
  90% { opacity: 0.2; }
  to { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}
.dark-mode .particle { opacity: 0.25; }

/* Slide entrance animations — staggered children
   IMPORTANT: We exclude .flip-cards from these parent animations
   because .flip-card uses transform for its 3D flip mechanism,
   and a parent transform would block clicks/conflict with flip. */
.slide.active .stage-content > *:not(.flip-cards),
.slide.active .toc-content > *,
.slide.active .skills-content > *,
.slide.active .roadmap-content > *,
.slide.active .metaphor-content > *,
.slide.active .journey-content > *,
.slide.active .problematique-content > *,
.slide.active .discovery-content > *,
.slide.active .comparison-content > *,
.slide.active .cockpit-content > *,
.slide.active .final-content > * {
  animation: contentRise 0.7s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.slide.active .stage-content > *:nth-child(1),
.slide.active .toc-content > *:nth-child(1),
.slide.active .skills-content > *:nth-child(1),
.slide.active .roadmap-content > *:nth-child(1),
.slide.active .metaphor-content > *:nth-child(1),
.slide.active .journey-content > *:nth-child(1),
.slide.active .problematique-content > *:nth-child(1),
.slide.active .discovery-content > *:nth-child(1),
.slide.active .comparison-content > *:nth-child(1),
.slide.active .cockpit-content > *:nth-child(1),
.slide.active .final-content > *:nth-child(1) { animation-delay: 0.05s; }

.slide.active .stage-content > *:nth-child(2),
.slide.active .toc-content > *:nth-child(2),
.slide.active .skills-content > *:nth-child(2),
.slide.active .roadmap-content > *:nth-child(2),
.slide.active .metaphor-content > *:nth-child(2),
.slide.active .journey-content > *:nth-child(2),
.slide.active .problematique-content > *:nth-child(2),
.slide.active .discovery-content > *:nth-child(2),
.slide.active .comparison-content > *:nth-child(2),
.slide.active .cockpit-content > *:nth-child(2),
.slide.active .final-content > *:nth-child(2) { animation-delay: 0.15s; }

.slide.active .stage-content > *:nth-child(3),
.slide.active .toc-content > *:nth-child(3),
.slide.active .skills-content > *:nth-child(3),
.slide.active .roadmap-content > *:nth-child(3),
.slide.active .metaphor-content > *:nth-child(3),
.slide.active .journey-content > *:nth-child(3),
.slide.active .problematique-content > *:nth-child(3),
.slide.active .discovery-content > *:nth-child(3),
.slide.active .comparison-content > *:nth-child(3),
.slide.active .cockpit-content > *:nth-child(3),
.slide.active .final-content > *:nth-child(3) { animation-delay: 0.25s; }

.slide.active .stage-content > *:nth-child(4),
.slide.active .toc-content > *:nth-child(4),
.slide.active .skills-content > *:nth-child(4),
.slide.active .roadmap-content > *:nth-child(4),
.slide.active .problematique-content > *:nth-child(4) { animation-delay: 0.35s; }

.slide.active .stage-content > *:nth-child(5),
.slide.active .skills-content > *:nth-child(5),
.slide.active .roadmap-content > *:nth-child(5) { animation-delay: 0.45s; }

@keyframes contentRise {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

/* TOC items — staggered cascade */
.slide.active .toc-grid .toc-item {
  animation: tocItemRise 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.slide.active .toc-grid .toc-item:nth-child(1) { animation-delay: 0.1s; }
.slide.active .toc-grid .toc-item:nth-child(2) { animation-delay: 0.18s; }
.slide.active .toc-grid .toc-item:nth-child(3) { animation-delay: 0.26s; }
.slide.active .toc-grid .toc-item:nth-child(4) { animation-delay: 0.34s; }
.slide.active .toc-grid .toc-item:nth-child(5) { animation-delay: 0.42s; }
.slide.active .toc-grid .toc-item:nth-child(6) { animation-delay: 0.50s; }
.slide.active .toc-grid .toc-item:nth-child(7) { animation-delay: 0.58s; }
.slide.active .toc-grid .toc-item:nth-child(8) { animation-delay: 0.66s; }
@keyframes tocItemRise {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Flip cards — NO entrance animation
   Clicks must work IMMEDIATELY when slide arrives
   The flip itself IS the animation */

/* Skills cards entrance */
.slide.active .skills-grid .skill-card {
  animation: skillEntrance 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.slide.active .skills-grid .skill-card:nth-child(1) { animation-delay: 0.2s; }
.slide.active .skills-grid .skill-card:nth-child(2) { animation-delay: 0.35s; }
.slide.active .skills-grid .skill-card:nth-child(3) { animation-delay: 0.5s; }
@keyframes skillEntrance {
  from { opacity: 0; transform: translateY(30px) scale(0.92); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Roadmap milestones entrance */
.slide.active .roadmap-timeline-new .roadmap-milestone {
  animation: roadmapEntrance 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.slide.active .roadmap-timeline-new .roadmap-milestone:nth-child(2) { animation-delay: 0.25s; }
.slide.active .roadmap-timeline-new .roadmap-milestone:nth-child(3) { animation-delay: 0.4s; }
.slide.active .roadmap-timeline-new .roadmap-milestone:nth-child(4) { animation-delay: 0.55s; }
@keyframes roadmapEntrance {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Pillars (problematique) entrance */
.slide.active .problematique-pillars .problematique-pillar {
  animation: pillarRise 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.slide.active .problematique-pillars .problematique-pillar:nth-child(1) { animation-delay: 0.4s; }
.slide.active .problematique-pillars .problematique-pillar:nth-child(2) { animation-delay: 0.55s; }
.slide.active .problematique-pillars .problematique-pillar:nth-child(3) { animation-delay: 0.7s; }
@keyframes pillarRise {
  from { opacity: 0; transform: translateY(30px) scale(0.85); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Cockpit tabs entrance */
.slide.active .cockpit-tabs .cockpit-tab {
  animation: tabPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.slide.active .cockpit-tabs .cockpit-tab:nth-child(1) { animation-delay: 0.15s; }
.slide.active .cockpit-tabs .cockpit-tab:nth-child(2) { animation-delay: 0.22s; }
.slide.active .cockpit-tabs .cockpit-tab:nth-child(3) { animation-delay: 0.29s; }
.slide.active .cockpit-tabs .cockpit-tab:nth-child(4) { animation-delay: 0.36s; }
.slide.active .cockpit-tabs .cockpit-tab:nth-child(5) { animation-delay: 0.43s; }
.slide.active .cockpit-tabs .cockpit-tab:nth-child(6) { animation-delay: 0.50s; }
@keyframes tabPop {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

/* Highlight pulse on counter when it changes */
.slide-counter-badge.changed .counter-num {
  animation: counterFlash 0.6s ease;
}
@keyframes counterFlash {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); box-shadow: 0 0 0 8px rgba(0, 165, 80, 0.2); }
  100% { transform: scale(1); }
}

/* Subtle scale-in for active slide content */
.slide { transform: scale(0.98); }
.slide.active { transform: scale(1); transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.4, 0, 0.2, 1); }

/* ========== NAV ========== */
.chapter-markers { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); padding: 10px 16px; border-radius: 100px; border: 1px solid var(--line); box-shadow: var(--shadow-md); }
.chapter-markers.dark { background: rgba(0,22,38,0.85); border-color: rgba(255,255,255,0.1); }
.chapter-marker { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,42,84,0.2); cursor: none; transition: all 0.3s; position: relative; border: none; padding: 0; }
.chapter-markers.dark .chapter-marker { background: rgba(255,255,255,0.25); }
.chapter-marker:hover { background: var(--navy); transform: scale(1.4); }
.chapter-marker.active { background: var(--green); width: 32px; border-radius: 5px; box-shadow: 0 0 12px rgba(0,165,80,0.5); }
.nav-controls { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; gap: 8px; }
.nav-btn { width: 44px; height: 44px; border-radius: 50%; background: #fff; border: 1px solid var(--line); color: var(--navy); font-size: 18px; cursor: none; transition: all 0.25s; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(0,42,84,0.06); }
.nav-btn:hover { background: var(--green); border-color: var(--green); color: #fff; transform: scale(1.1); }
.nav-btn:disabled { opacity: 0.4; }
.kbd-hint { position: fixed; bottom: 80px; right: 24px; z-index: 99; font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); letter-spacing: 0.1em; text-align: right; pointer-events: none; line-height: 1.8; }
.kbd { display: inline-block; background: #fff; border: 1px solid var(--line); border-radius: 3px; padding: 1px 6px; margin: 0 2px; color: var(--navy); font-weight: 600; }

/* ========== KEYFRAMES ========== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes gridDrift { from { background-position: 0 0; } to { background-position: 60px 60px; } }
@keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,-40px) scale(1.1); } }
@keyframes blink { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.8); } }
@keyframes counterIn { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
@keyframes floatLogo { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-15px) rotate(2deg); } }
@keyframes peakPulse { 0%,100% { box-shadow: 0 0 20px rgba(232,153,35,0.4); } 50% { box-shadow: 0 0 35px rgba(232,153,35,0.8); } }
@keyframes blinkCursor { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
@keyframes vsRotate { 0%,100% { transform: translate(-50%,-50%) rotate(-3deg); } 50% { transform: translate(-50%,-50%) rotate(3deg); } }
@keyframes flipPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes roiShine { 0% { left: -100%; } 60%,100% { left: 200%; } }
@keyframes dialogueIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
@keyframes arrowSlide { 0% { left: -25px; } 100% { left: 100%; } }

/* ========== SLIDE: COLD ========== */
.slide-cold { background: radial-gradient(ellipse at center, #002a54 0%, #001a38 60%, #000a14 100%); color: #fff; }
.slide-cold .slide-inner { position: relative; overflow: hidden; }
.cold-video-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.cold-video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  transform: translate(-50%, -50%);
  object-fit: cover;
  opacity: 0;
  animation: videoFadeIn 2s ease 0.3s forwards;
}
@keyframes videoFadeIn {
  from { opacity: 0; }
  to { opacity: 0.55; }
}
.cold-video-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(0,10,20,0.85) 0%, rgba(0,26,56,0.55) 35%, rgba(0,26,56,0.55) 65%, rgba(0,10,20,0.9) 100%);
  z-index: 1;
}
.cold-video-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,10,20,0.7) 100%);
  z-index: 2;
}
.cold-content { text-align: center; position: relative; z-index: 5; max-width: 1100px; }
.cold-time { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.4em; color: var(--green-soft); margin-bottom: 32px; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; text-shadow: 0 2px 12px rgba(0,0,0,0.8); }
.cold-counter { font-family: var(--font-serif); font-weight: 900; font-size: clamp(80px, 18vw, 280px); line-height: 0.9; color: #fff; letter-spacing: -0.04em; opacity: 0; animation: counterIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards; text-shadow: 0 0 80px rgba(0,165,80,0.5), 0 4px 30px rgba(0,0,0,0.9); }
.cold-question { font-family: var(--font-serif); font-style: italic; font-size: clamp(20px,2.5vw,30px); color: rgba(255,255,255,0.95); margin-top: 40px; max-width: 900px; margin-left: auto; margin-right: auto; line-height: 1.5; opacity: 0; animation: fadeUp 1s ease 1.8s forwards; text-shadow: 0 2px 20px rgba(0,0,0,0.9); }

.cold-sub { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.3em; color: rgba(255,255,255,0.7); margin-top: 60px; opacity: 0; animation: fadeUp 1s ease 2.6s forwards; text-transform: uppercase; text-shadow: 0 2px 12px rgba(0,0,0,0.8); }
.alert-grid { position: absolute; inset: 0; pointer-events: none; opacity: 0.3; z-index: 3; }
.alert-dot { position: absolute; width: 4px; height: 4px; background: var(--crimson); border-radius: 50%; animation: blink var(--blink-dur,2s) ease-in-out infinite; animation-delay: var(--blink-delay,0s); box-shadow: 0 0 8px var(--crimson); }

/* ========== SLIDE: TITLE ========== */
.slide-title { background: var(--bg); }

.title-orb { position: absolute; width: 500px; height: 500px; border-radius: 50%; filter: blur(100px); opacity: 0.18; pointer-events: none; animation: orbFloat 20s ease-in-out infinite; }

.float-logo.l2 { top: 28%; right: 10%; animation-delay: -2s; }
.float-logo.l3 { bottom: 22%; left: 14%; animation-delay: -3s; }
.float-logo.l4 { bottom: 18%; right: 8%; animation-delay: -1s; }
.float-logo.l5 { top: 52%; left: 4%; animation-delay: -4s; }
.float-logo.l6 { top: 60%; right: 4%; animation-delay: -5s; }
.title-content { position: relative; z-index: 3; text-align: center; max-width: 1200px; }
.title-tag { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; color: var(--green-deep); background: rgba(0,165,80,0.08); border: 1px solid rgba(0,165,80,0.25); padding: 8px 16px; border-radius: 100px; margin-bottom: 36px; }

.title-h { font-family: var(--font-serif); font-weight: 900; font-size: clamp(48px,7vw,110px); line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 24px; color: var(--navy); }
.title-h-em { background: linear-gradient(135deg, var(--green), var(--green-deep)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-style: italic; }
.title-sub { font-size: clamp(16px,1.4vw,22px); color: var(--ink-soft); max-width: 800px; margin: 0 auto 60px; line-height: 1.6; }
.title-meta { display: flex; justify-content: center; align-items: stretch; flex-wrap: wrap; }
.title-meta-block { text-align: left; padding: 0 28px; border-left: 2px solid var(--line); }

.title-meta-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--ink-muted); text-transform: uppercase; margin-bottom: 8px; }
.title-meta-value { font-size: 18px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.title-meta-extra { font-size: 13px; color: var(--ink-soft); font-family: var(--font-mono); }

/* University logos in title meta */

.title-uni-logo { background: #fff; padding: 14px 22px; border-radius: 12px; box-shadow: var(--shadow-md); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; transition: transform 0.3s, box-shadow 0.3s; }
.title-uni-logo:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
.title-uni-logo img { height: 50px; width: auto; max-width: 220px; object-fit: contain; display: block; }
.title-uni-cross { font-family: var(--font-serif); font-weight: 900; font-size: 32px; color: var(--green); }

/* ========== SLIDE: TOC ========== */
.slide-toc { background: linear-gradient(180deg, #fff 0%, var(--bg) 100%); }
.toc-content { width: 100%; max-width: 1400px; }
.toc-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.25em; color: var(--green); text-transform: uppercase; margin-bottom: 16px; text-align: center; }
.toc-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(36px,4.5vw,60px); text-align: center; margin-bottom: 12px; line-height: 1.1; color: var(--navy); letter-spacing: -0.02em; }
.toc-h em { color: var(--green); font-style: italic; }
.toc-sub { text-align: center; font-size: 16px; color: var(--ink-soft); margin-bottom: 50px; font-style: italic; }
/* ========== TOC NEW CREATIVE DESIGN ========== */
.toc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  max-width: 1200px;
  margin: 0 auto;
}
.toc-item {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 0;
  cursor: none;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  text-align: left;
  display: grid;
  grid-template-columns: 80px 1fr;
  align-items: center;
  position: relative;
  overflow: hidden;
  min-height: 88px;
}
/* Color stripe on the left of each card */
.toc-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  width: 4px;
  background: var(--green);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.toc-item:nth-child(1)::before { background: linear-gradient(180deg, var(--navy), var(--navy-soft)); }
.toc-item:nth-child(2)::before { background: linear-gradient(180deg, var(--green-soft), var(--green)); }
.toc-item:nth-child(3)::before { background: linear-gradient(180deg, var(--amber), #f4b04d); }
.toc-item:nth-child(4)::before { background: linear-gradient(180deg, var(--violet), #8a6cd9); }
.toc-item:nth-child(5)::before { background: linear-gradient(180deg, var(--crimson), #e07060); }
.toc-item:nth-child(6)::before { background: linear-gradient(180deg, #00bcd4, #4fd1e1); }
.toc-item:nth-child(7)::before { background: linear-gradient(180deg, #00897b, #34a89b); }
.toc-item:nth-child(8)::before { background: linear-gradient(180deg, var(--navy), var(--green)); }
.toc-item:nth-child(9)::before { background: linear-gradient(180deg, var(--violet), var(--amber)); }

/* Hover: stripe extends to fill background with color */
.toc-item:hover::before { width: 100%; opacity: 0.12; }
.toc-item:hover { transform: translateY(-3px) translateX(2px); box-shadow: 0 12px 32px rgba(0,42,84,0.15); border-color: transparent; }

/* Number column on the left */
.toc-item-num {
  font-family: var(--font-serif);
  font-weight: 900;
  font-size: 44px;
  line-height: 1;
  background: linear-gradient(135deg, var(--navy) 0%, var(--green) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  padding: 0 12px 0 24px;
  position: relative;
  z-index: 2;
  transition: transform 0.4s;
  letter-spacing: -0.04em;
}
.toc-item:hover .toc-item-num { transform: scale(1.15); }
.toc-item:nth-child(1):hover .toc-item-num { background: linear-gradient(135deg, var(--navy), var(--navy-soft)); -webkit-background-clip: text; background-clip: text; }
.toc-item:nth-child(2):hover .toc-item-num { background: linear-gradient(135deg, var(--green-soft), var(--green-deep)); -webkit-background-clip: text; background-clip: text; }
.toc-item:nth-child(3):hover .toc-item-num { background: linear-gradient(135deg, var(--amber), #c47a14); -webkit-background-clip: text; background-clip: text; }
.toc-item:nth-child(4):hover .toc-item-num { background: linear-gradient(135deg, var(--violet), #8a6cd9); -webkit-background-clip: text; background-clip: text; }
.toc-item:nth-child(5):hover .toc-item-num { background: linear-gradient(135deg, var(--crimson), #a02816); -webkit-background-clip: text; background-clip: text; }
.toc-item:nth-child(6):hover .toc-item-num { background: linear-gradient(135deg, #00bcd4, #007a90); -webkit-background-clip: text; background-clip: text; }
.toc-item:nth-child(7):hover .toc-item-num { background: linear-gradient(135deg, #00897b, #005a4f); -webkit-background-clip: text; background-clip: text; }
.toc-item:nth-child(8):hover .toc-item-num { background: linear-gradient(135deg, var(--navy), var(--green)); -webkit-background-clip: text; background-clip: text; }
.toc-item:nth-child(9):hover .toc-item-num { background: linear-gradient(135deg, var(--violet), var(--amber)); -webkit-background-clip: text; background-clip: text; }

/* Body in the middle */
.toc-item-body {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 16px 12px;
  position: relative;
  z-index: 2;
}
.toc-item-chapter {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 600;
}
.toc-item-title {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 18px;
  color: var(--navy);
  line-height: 1.2;
}
.toc-item-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.15em;
  font-weight: 600;
  padding: 0 24px 0 12px;
  position: relative;
  z-index: 2;
  background: rgba(0,42,84,0.05);
  border-radius: 100px;
  padding: 4px 10px;
  margin-right: 24px;
  display: inline-block;
}

  background: rgba(255,255,255,0.85);
  color: var(--navy);
}

/* ========== SLIDE: PROBLEMATIQUE ========== */

.problematique-pillar-title { font-family: var(--font-serif); font-weight: 700; font-size: 16px; color: #fff; line-height: 1.3; }
.slide-stage { background: linear-gradient(180deg, #fff 0%, var(--bg) 100%); }

.stage-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(32px,4vw,56px); line-height: 1.05; color: var(--navy); margin-bottom: 36px; letter-spacing: -0.02em; }

/* ========== SLIDE: JOURNEY (flip-card design) ========== */

.journey-flip-card { height: 380px; position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4,0,0.2,1); }

.journey-flip-bg { position: absolute; inset: 0; z-index: 0; }
.journey-flip-bg svg { width: 100%; height: 100%; display: block; }
.journey-flip-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,42,84,0) 35%, rgba(0,30,60,0.92) 100%); z-index: 1; }
.journey-flip-content { position: relative; z-index: 2; padding: 28px 30px; color: #fff; }
.journey-flip-num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }

.journey-flip-card.p2 .journey-flip-num { color: #b3f0c5; }
.journey-flip-title { font-family: var(--font-serif); font-weight: 700; font-size: 26px; line-height: 1.15; margin-bottom: 10px; color: #fff; }
.journey-flip-subtitle { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; color: rgba(255,255,255,0.8); text-transform: uppercase; }
.journey-flip-hint { position: absolute; top: 16px; right: 16px; background: rgba(0,165,80,0.95); color: #fff; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; padding: 6px 11px; border-radius: 100px; z-index: 3; font-weight: 600; text-transform: uppercase; box-shadow: 0 4px 12px rgba(0,165,80,0.4); animation: flipPulse 2s ease-in-out infinite; }
.journey-flip-card.p1 .journey-flip-hint { background: rgba(232,153,35,0.95); box-shadow: 0 4px 12px rgba(232,153,35,0.4); }
.journey-flip-back-num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 600; }
.journey-flip-card.p1 .journey-flip-back-num { color: #b67414; }
.journey-flip-card.p2 .journey-flip-back-num { color: var(--green-deep); }
.journey-flip-back-title { font-family: var(--font-serif); font-weight: 700; font-size: 20px; color: var(--navy); line-height: 1.2; }
.journey-flip-back-mission { font-size: 13px; color: var(--ink-soft); line-height: 1.55; }
.journey-flip-back-mission strong { color: var(--navy); font-weight: 600; }
.journey-flip-back-mission code { font-family: var(--font-mono); font-size: 11px; background: rgba(0,42,84,0.08); padding: 1px 6px; border-radius: 3px; color: var(--navy); }
.journey-flip-back-quote { font-style: italic; color: var(--navy); font-size: 12px; padding: 10px 14px; background: rgba(255,255,255,0.6); border-left: 3px solid; border-radius: 4px; margin-top: auto; }
.journey-flip-card.p1 .journey-flip-back-quote { border-color: var(--amber); }
.journey-flip-card.p2 .journey-flip-back-quote { border-color: var(--green); }
.journey-flip-back-stack { display: flex; flex-wrap: wrap; gap: 5px; }
.stack-pill { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 9px; border-radius: 100px; font-weight: 600; }
.journey-flip-card.p1 .stack-pill { background: rgba(232,153,35,0.18); border: 1px solid rgba(232,153,35,0.4); color: #8a5712; }
.journey-flip-card.p2 .stack-pill { background: rgba(0,165,80,0.18); border: 1px solid rgba(0,165,80,0.4); color: var(--green-deep); }
.agile-banner { background: linear-gradient(135deg, #fff 0%, #f0faf3 100%); border: 1px solid var(--line); border-left: 4px solid var(--violet); border-radius: 12px; padding: 18px 24px; display: grid; grid-template-columns: auto 1fr auto; gap: 20px; align-items: center; cursor: none; transition: box-shadow 0.3s; }
.agile-banner:hover { box-shadow: var(--shadow-lg); }
.agile-icon { width: 48px; height: 48px; background: var(--violet); border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }
.agile-text { font-size: 13px; color: var(--ink-soft); line-height: 1.55; }
.agile-text strong { color: var(--navy); font-weight: 600; }
.agile-text-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--violet); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
.agile-rituals { display: flex; gap: 6px; flex-wrap: wrap; }
.agile-ritual { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(107,70,193,0.08); border: 1px solid rgba(107,70,193,0.25); color: var(--violet); padding: 4px 9px; border-radius: 100px; font-weight: 600; }

/* ========== SLIDE: PROBLEM ========== */
.slide-problem { background: var(--navy); color: #fff; }
.problem-content { max-width: 1100px; width: 100%; text-align: center; }
.problem-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.3em; color: var(--amber); margin-bottom: 24px; text-transform: uppercase; }
.problem-h { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: clamp(32px,4vw,56px); line-height: 1.2; margin-bottom: 60px; color: rgba(255,255,255,0.95); }
.problem-h em { color: var(--amber); font-style: normal; font-weight: 700; }
.dialogue { text-align: left; max-width: 800px; margin: 0 auto; font-family: var(--font-serif); font-size: 22px; line-height: 1.8; }
.dialogue-line { display: flex; gap: 20px; margin-bottom: 18px; opacity: 0; }
.slide-problem.active .dialogue-line { animation: dialogueIn 0.6s ease forwards; }
.slide-problem.active .dialogue-line:nth-child(1) { animation-delay: 0.2s; }
.slide-problem.active .dialogue-line:nth-child(2) { animation-delay: 1.4s; }
.slide-problem.active .dialogue-line:nth-child(3) { animation-delay: 2.6s; }
.slide-problem.active .dialogue-line:nth-child(4) { animation-delay: 3.8s; }
.dialogue-speaker { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; color: rgba(255,255,255,0.4); min-width: 100px; padding-top: 10px; text-transform: uppercase; }
.dialogue-line.manager .dialogue-speaker { color: var(--amber); }
.dialogue-line.me .dialogue-speaker { color: var(--green-soft); }
.dialogue-text { flex: 1; font-style: italic; color: rgba(255,255,255,0.9); }
.dialogue-line.manager .dialogue-text { color: #fff; }
.problem-conclusion { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.2em; color: var(--green-soft); margin-top: 50px; text-transform: uppercase; opacity: 0; }
.slide-problem.active .problem-conclusion { animation: fadeUp 1s ease 5s forwards; }

/* ========== SLIDE: METAPHOR ========== */
.slide-metaphor { background: #fff; }
.metaphor-content { max-width: 1400px; width: 100%; }
.metaphor-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.25em; color: var(--green); text-align: center; text-transform: uppercase; margin-bottom: 16px; }
.metaphor-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(32px,4vw,56px); text-align: center; margin-bottom: 12px; line-height: 1.1; color: var(--navy); letter-spacing: -0.02em; }
.metaphor-h em { color: var(--amber); font-style: italic; }
.metaphor-sub { text-align: center; font-size: 15px; color: var(--ink-soft); margin-bottom: 36px; font-style: italic; }
.metaphor-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; perspective: 1200px; }
.metaphor-card { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 22px 16px; position: relative; cursor: none; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; }
.metaphor-row:hover .metaphor-card { opacity: 0.5; transform: scale(0.94); filter: blur(0.5px); }
.metaphor-row:hover .metaphor-card:hover {
  opacity: 1;
  transform: scale(1.15) translateY(-16px) translateZ(50px);
  filter: blur(0);
  background: linear-gradient(135deg, #fff 0%, #f0faf3 100%);
  border-color: var(--green);
  box-shadow: 0 30px 60px rgba(0, 165, 80, 0.35), 0 12px 24px rgba(0, 165, 80, 0.2), 0 0 0 4px rgba(0, 165, 80, 0.1);
  z-index: 10;
}
.metaphor-card:hover .metaphor-emoji { transform: scale(1.4) rotate(-8deg); }
.metaphor-arrow { position: absolute; top: 50%; right: -10px; transform: translateY(-50%); z-index: 5; color: var(--green); font-family: var(--font-mono); font-size: 18px; font-weight: bold; pointer-events: none; transition: opacity 0.3s; }
.metaphor-row:hover .metaphor-arrow { opacity: 0.3; }
.metaphor-card:hover .metaphor-arrow { opacity: 1; }
.metaphor-card:last-child .metaphor-arrow { display: none; }
.metaphor-num { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); letter-spacing: 0.2em; margin-bottom: 10px; }
.metaphor-emoji { font-size: 38px; margin-bottom: 10px; display: block; transition: transform 0.4s; }
.metaphor-card:hover .metaphor-emoji { transform: scale(1.2) rotate(-8deg); }
.metaphor-logo { width: 28px; height: 28px; margin-bottom: 10px; display: flex; align-items: center; }
.metaphor-tech { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--green-deep); text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
.metaphor-name { font-family: var(--font-serif); font-weight: 700; font-size: 17px; color: var(--navy); margin-bottom: 6px; }
.metaphor-analogy { font-style: italic; font-size: 12px; color: var(--ink-soft); line-height: 1.5; }
.metaphor-analogy strong { color: var(--navy); font-style: normal; font-weight: 600; }
.metaphor-arrow { position: absolute; top: 50%; right: -10px; transform: translateY(-50%); z-index: 5; color: var(--green); font-family: var(--font-mono); font-size: 18px; font-weight: bold; pointer-events: none; }
.metaphor-card:last-child .metaphor-arrow { display: none; }
.roi-banner { margin-top: 28px; background: linear-gradient(135deg, var(--navy) 0%, var(--green-deep) 100%); border-radius: 12px; padding: 22px 32px; display: grid; grid-template-columns: auto 1fr auto; gap: 28px; align-items: center; cursor: none; position: relative; overflow: hidden; color: #fff; transition: box-shadow 0.3s; }
.roi-banner::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); animation: roiShine 4s ease-in-out infinite; }
.roi-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.15); border-radius: 14px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.2); z-index: 2; position: relative; }
.roi-text-content { z-index: 2; position: relative; }
.roi-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3em; color: var(--green-soft); text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
.roi-headline { font-family: var(--font-serif); font-weight: 700; font-size: 22px; color: #fff; line-height: 1.2; margin-bottom: 4px; }
.roi-headline em { color: var(--green-soft); font-style: italic; }
.roi-detail { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.5; }
.roi-detail strong { color: #fff; font-weight: 600; }
.roi-stat { text-align: right; z-index: 2; position: relative; }
.roi-stat-num { font-family: var(--font-serif); font-weight: 900; font-size: 44px; color: var(--green-soft); line-height: 1; letter-spacing: -0.02em; }
.roi-stat-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; color: rgba(255,255,255,0.65); text-transform: uppercase; margin-top: 4px; }
.metaphor-quote { margin-top: 24px; text-align: center; font-family: var(--font-serif); font-style: italic; font-size: 18px; color: var(--ink-soft); max-width: 800px; margin-left: auto; margin-right: auto; }
.metaphor-quote em { color: var(--green); font-style: normal; font-weight: 600; }

/* ========== SLIDE: DISCOVERY ========== */
.slide-discovery { background: var(--bg); }
.discovery-content { max-width: 1300px; width: 100%; display: grid; grid-template-columns: 1fr 1.3fr; gap: 60px; align-items: center; }
.discovery-text { text-align: left; }
.discovery-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.25em; color: var(--amber); text-transform: uppercase; margin-bottom: 16px; }
.discovery-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(36px,4vw,56px); line-height: 1.1; margin-bottom: 24px; letter-spacing: -0.02em; color: var(--navy); }
.discovery-h em { color: var(--amber); font-style: italic; }
.discovery-p { font-size: 17px; line-height: 1.7; color: var(--ink-soft); margin-bottom: 16px; }
.discovery-p strong { color: var(--navy); font-weight: 600; }
.discovery-finding { margin-top: 32px; padding: 20px 24px; background: rgba(232,153,35,0.08); border-left: 3px solid var(--amber); border-radius: 4px; font-family: var(--font-mono); font-size: 13px; color: #8a4f08; line-height: 1.6; }
.discovery-finding strong { color: var(--amber); display: block; margin-bottom: 6px; }
.heatmap { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 32px; box-shadow: var(--shadow-md); cursor: none; transition: box-shadow 0.3s; }
.heatmap:hover { box-shadow: var(--shadow-xl); }
.heatmap-title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; color: var(--ink-muted); text-transform: uppercase; margin-bottom: 24px; }
.heatmap-row { display: grid; grid-template-columns: 60px 1fr 80px; gap: 12px; align-items: center; margin-bottom: 14px; }
.heatmap-day { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--ink-soft); }
.heatmap-row.peak .heatmap-day { color: var(--amber); }
.heatmap-bar { height: 22px; background: var(--green); border-radius: 3px; opacity: 0.6; transform-origin: left center; transition: transform 0.4s; }
.heatmap-row:hover .heatmap-bar { transform: scaleY(1.2); }
.heatmap-row.peak .heatmap-bar { background: var(--amber); opacity: 1; box-shadow: 0 0 20px rgba(232,153,35,0.4); animation: peakPulse 2s ease-in-out infinite; }
.heatmap-val { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); text-align: right; }
.heatmap-row.peak .heatmap-val { color: var(--amber); font-weight: 600; }

/* ========== SLIDE: COMPARISON ========== */
.slide-comparison { background: #fff; }
.slide-comparison .slide-inner { padding: 0; }
.comparison-content { width: 100%; height: 100vh; display: flex; position: relative; align-items: stretch; }
.comp-side { flex: 1; padding: 100px 60px 60px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: auto; }
.comp-side.before { background: linear-gradient(135deg, #fff5f4 0%, #ffe8e5 100%); }
.comp-side.after { background: linear-gradient(135deg, #f0faf3 0%, #d4f1e0 100%); }
.comp-label { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 20px; font-weight: 600; }
.comp-side.before .comp-label { color: var(--crimson); }
.comp-side.after .comp-label { color: var(--green-deep); }
.comp-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(28px,3vw,44px); line-height: 1.1; margin-bottom: 32px; letter-spacing: -0.02em; color: var(--navy); }
.comp-list { list-style: none; }
.comp-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(0,42,84,0.1); font-size: 16px; line-height: 1.5; color: var(--ink-soft); transition: transform 0.3s, padding-left 0.3s; }
.comp-item:hover { transform: translateX(4px); padding-left: 8px; }
.comp-icon { font-family: var(--font-mono); font-size: 16px; flex-shrink: 0; margin-top: 2px; font-weight: bold; }
.comp-side.before .comp-icon { color: var(--crimson); }
.comp-side.after .comp-icon { color: var(--green); }
.comp-item strong { color: var(--navy); font-weight: 600; }
.comp-item code { font-family: var(--font-mono); font-size: 13px; background: rgba(0,42,84,0.06); padding: 2px 8px; border-radius: 3px; color: var(--navy); }
/* VS as a flex sibling between the two halves - GUARANTEED centered */
.comp-vs-wrapper {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  pointer-events: none;
}
.comp-vs {
  width: 90px;
  height: 90px;
  background: var(--navy);
  border: 4px solid #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 700;
  font-size: 28px;
  color: #fff;
  box-shadow: 0 0 0 6px rgba(0,42,84,0.1), 0 30px 60px rgba(0,42,84,0.3);
  animation: vsRotate 8s ease-in-out infinite;
  letter-spacing: 0;
  line-height: 1;
}

/* Browser-window-style image frames */
.comp-browser {
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
  cursor: pointer;
  position: relative;
  background: #fff;
  border: 1px solid var(--line);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 8px 24px rgba(0,42,84,0.12);
}
.comp-browser:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 20px 50px rgba(0,42,84,0.25);
}
.comp-side.before .comp-browser { border-top: 3px solid var(--crimson); }
.comp-side.after .comp-browser { border-top: 3px solid var(--green); }
.comp-side.before .comp-browser:hover { box-shadow: 0 20px 50px rgba(192,57,43,0.3); }
.comp-side.after .comp-browser:hover { box-shadow: 0 20px 50px rgba(0,165,80,0.3); }

/* Browser top bar (macOS-style) */
.comp-browser-bar {
  height: 36px;
  background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%);
  border-bottom: 1px solid #d1d5db;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 0 14px;
}
.comp-browser-dots { display: flex; gap: 6px; }
.comp-browser-dots .dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: block;
}
.comp-browser-dots .dot.red { background: #ff5f57; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.1); }
.comp-browser-dots .dot.yellow { background: #ffbd2e; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.1); }
.comp-browser-dots .dot.green { background: #28c941; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.1); }
.comp-browser-url {
  background: #fff;
  border-radius: 6px;
  padding: 4px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: #4b5563;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid #d1d5db;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.comp-browser-lock { font-size: 10px; opacity: 0.7; }
.comp-browser-spacer { width: 50px; }

/* Browser content area */
.comp-browser-screen {
  position: relative;
  width: 100%;
  height: 220px;
  overflow: hidden;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
}
.comp-browser-screen img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  background: #fff;
}
.comp-browser:hover .comp-browser-screen img { transform: scale(1.02); }

.comp-browser-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,42,84,0) 50%, rgba(0,42,84,0.85) 100%);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 18px;
  opacity: 0;
  transition: opacity 0.4s;
}
.comp-browser:hover .comp-browser-overlay { opacity: 1; }

.comp-browser-zoom {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.15em;
  color: #fff;
  text-transform: uppercase;
  font-weight: 700;
  background: rgba(255,255,255,0.18);
  padding: 10px 18px;
  border-radius: 100px;
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid rgba(255,255,255,0.3);
}
.comp-browser-zoom svg { flex-shrink: 0; }

.comp-image-caption {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  text-align: center;
  margin-bottom: 18px;
  font-weight: 500;
}

/* Lightbox modal */
.lightbox-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,22,38,0.95);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  animation: lightboxFadeIn 0.3s ease-out;
}
@keyframes lightboxFadeIn {
  from { opacity: 0; backdrop-filter: blur(0px); }
  to { opacity: 1; backdrop-filter: blur(8px); }
}
.lightbox-content {
  position: relative;
  max-width: 90vw;
  max-height: 90vh;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,42,84,0.5);
  animation: lightboxScaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: default;
  display: flex;
  flex-direction: column;
}
@keyframes lightboxScaleIn {
  from { opacity: 0; transform: scale(0.92) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.lightbox-tag {
  position: absolute;
  top: 16px;
  left: 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  font-weight: 700;
  padding: 8px 14px;
  border-radius: 100px;
  z-index: 10;
  color: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.lightbox-tag.before { background: var(--crimson); }
.lightbox-tag.after { background: var(--green); }
.lightbox-content img {
  width: 100%;
  height: auto;
  max-height: 70vh;
  object-fit: contain;
  display: block;
  background: #f4f7f6;
}
.lightbox-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 44px;
  height: 44px;
  background: rgba(0,42,84,0.85);
  backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.3s;
  font-weight: bold;
}
.lightbox-close:hover { background: var(--crimson); transform: scale(1.1) rotate(90deg); }
.lightbox-caption {
  padding: 18px 28px;
  background: linear-gradient(180deg, #fff 0%, var(--bg) 100%);
  border-top: 1px solid var(--line);
  font-size: 14px;
  color: var(--ink-soft);
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.lightbox-caption strong {
  font-family: var(--font-serif);
  font-size: 16px;
  color: var(--navy);
  font-weight: 700;
}
.lightbox-caption span {
  font-style: italic;
  font-size: 13px;
  color: var(--ink-muted);
}
.lightbox-hint {
  position: absolute;
  bottom: 10px;
  right: 16px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  text-transform: uppercase;
  pointer-events: none;
}
.lightbox-hint kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 3px;
  font-weight: 700;
  color: var(--navy);
}

/* ========== SLIDE: COCKPIT ========== */
.slide-cockpit { background: var(--bg); }
.cockpit-content { width: 100%; max-width: 1400px; }
.cockpit-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.25em; color: var(--green); text-transform: uppercase; margin-bottom: 16px; text-align: center; }
.cockpit-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(32px,4vw,52px); text-align: center; margin-bottom: 12px; line-height: 1.1; letter-spacing: -0.02em; color: var(--navy); }
.cockpit-h em { color: var(--green); font-style: italic; }
.cockpit-sub-text { text-align: center; font-size: 14px; color: var(--ink-muted); margin-bottom: 32px; font-family: var(--font-mono); }
.cockpit-tabs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
.cockpit-tab { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; background: #fff; border: 1px solid var(--line); color: var(--ink-soft); padding: 8px 14px; border-radius: 100px; cursor: none; transition: all 0.25s; font-weight: 500; }
.cockpit-tab:hover { background: rgba(0,165,80,0.08); color: var(--green-deep); border-color: var(--green); transform: translateY(-2px); }
.cockpit-tab.active { background: var(--green); border-color: var(--green); color: #fff; box-shadow: 0 4px 12px rgba(0,165,80,0.4); }
.cockpit-screen { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 8px; min-height: 420px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md); cursor: none; transition: box-shadow 0.4s; }
.cockpit-screen:hover { box-shadow: var(--shadow-xl); }
.cockpit-screen img { max-width: 100%; max-height: 460px; border-radius: 8px; display: block; }
.cockpit-finding { margin-top: 16px; padding: 14px 24px; background: rgba(0,165,80,0.06); border-left: 3px solid var(--green); border-radius: 4px; font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
.cockpit-finding strong { color: var(--green-deep); font-weight: 600; }

/* ========== SLIDE: ROADMAP (timeline + 3D illustrations + tools) ========== */
.slide-roadmap { background: linear-gradient(180deg, var(--bg) 0%, #fff 100%); }
.roadmap-content { width: 100%; max-width: 1400px; }
.roadmap-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.25em; color: var(--violet); text-align: center; text-transform: uppercase; margin-bottom: 16px; }
.roadmap-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(36px,4.5vw,60px); text-align: center; margin-bottom: 12px; line-height: 1.1; color: var(--navy); letter-spacing: -0.02em; }
.roadmap-h em { color: var(--violet); font-style: italic; }
.roadmap-sub { text-align: center; font-size: 18px; color: var(--ink-soft); margin-bottom: 50px; font-style: italic; }

/* Timeline */
.roadmap-timeline-new {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  padding: 30px 40px 40px;
  max-width: 1300px;
  margin: 0 auto;
}
.roadmap-timeline-track {
  position: absolute;
  top: 192px;
  left: 12%;
  right: 12%;
  height: 6px;
  background: rgba(0,42,84,0.08);
  border-radius: 3px;
  z-index: 1;
}
.roadmap-timeline-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 16%;
  background: linear-gradient(90deg, var(--green) 0%, var(--green-soft) 100%);
  border-radius: 3px;
  box-shadow: 0 0 12px rgba(0, 165, 80, 0.5);
}

/* Each milestone */
.roadmap-milestone {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  z-index: 2;
  padding: 0 16px;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.roadmap-milestone:hover { transform: translateY(-8px); }

/* 3D illustration box */
.roadmap-milestone-illust {
  width: 100%;
  height: 130px;
  border-radius: 14px;
  margin-bottom: 24px;
  display: grid;
  place-items: center;
  padding: 10px;
  position: relative;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid var(--line);
  background: #fff;
  overflow: hidden;
}
.roadmap-milestone-illust::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 14px;
  pointer-events: none;
  background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.4) 100%);
  opacity: 0;
  transition: opacity 0.4s;
}
.roadmap-milestone:hover .roadmap-milestone-illust::after { opacity: 1; }
.roadmap-milestone.done .roadmap-milestone-illust { background: linear-gradient(135deg, rgba(0,165,80,0.08) 0%, rgba(0,165,80,0.02) 100%); border-color: rgba(0,165,80,0.2); }
.roadmap-milestone.done:hover .roadmap-milestone-illust { box-shadow: 0 16px 40px rgba(0,165,80,0.2); border-color: rgba(0,165,80,0.4); transform: translateY(-4px); }
.roadmap-milestone.next .roadmap-milestone-illust { background: linear-gradient(135deg, rgba(232,153,35,0.08) 0%, rgba(232,153,35,0.02) 100%); border-color: rgba(232,153,35,0.2); }
.roadmap-milestone.next:hover .roadmap-milestone-illust { box-shadow: 0 16px 40px rgba(232,153,35,0.2); border-color: rgba(232,153,35,0.4); transform: translateY(-4px); }
.roadmap-milestone.future .roadmap-milestone-illust { background: linear-gradient(135deg, rgba(107,70,193,0.08) 0%, rgba(107,70,193,0.02) 100%); border-color: rgba(107,70,193,0.2); }
.roadmap-milestone.future:hover .roadmap-milestone-illust { box-shadow: 0 16px 40px rgba(107,70,193,0.2); border-color: rgba(107,70,193,0.4); transform: translateY(-4px); }
.roadmap-milestone-illust svg {
  width: 100%;
  height: 100%;
  max-width: 200px;
  filter: drop-shadow(0 4px 8px rgba(0,42,84,0.1));
}

/* Dot on the timeline */
.roadmap-milestone-dot {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
  position: relative;
  z-index: 3;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  background: #fff;
  border: 4px solid;
}
.roadmap-milestone-dot span {
  display: block;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: currentColor;
}
.roadmap-milestone.done .roadmap-milestone-dot {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 8px 24px rgba(0,165,80,0.4), 0 0 0 8px rgba(0,165,80,0.12);
  color: var(--green);
}
.roadmap-milestone.next .roadmap-milestone-dot {
  border-color: var(--amber);
  color: var(--amber);
  box-shadow: 0 4px 16px rgba(232,153,35,0.25);
  animation: dotPulseNext 2.4s ease-in-out infinite;
}
.roadmap-milestone.future .roadmap-milestone-dot {
  border-color: var(--violet);
  color: var(--violet);
  box-shadow: 0 4px 16px rgba(107,70,193,0.2);
}
@keyframes dotPulseNext {
  0%, 100% { box-shadow: 0 4px 16px rgba(232,153,35,0.25), 0 0 0 0 rgba(232,153,35,0.4); }
  50% { box-shadow: 0 4px 16px rgba(232,153,35,0.25), 0 0 0 12px rgba(232,153,35,0); }
}

.roadmap-milestone-when {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.roadmap-milestone.done .roadmap-milestone-when { color: var(--green); }
.roadmap-milestone.next .roadmap-milestone-when { color: var(--amber); }
.roadmap-milestone.future .roadmap-milestone-when { color: var(--violet); }

.roadmap-milestone-title {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 22px;
  color: var(--navy);
  margin-bottom: 10px;
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.roadmap-milestone-desc {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.5;
  max-width: 260px;
  margin-bottom: 18px;
}

/* Tool pills under each milestone */
.roadmap-milestone-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.rm-tool {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 100px;
  padding: 6px 14px 6px 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: 0.05em;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 2px 8px rgba(0,42,84,0.06);
}
.rm-tool svg { flex-shrink: 0; border-radius: 4px; }
.roadmap-milestone.done .rm-tool:hover { background: rgba(0,165,80,0.08); border-color: var(--green); color: var(--green-deep); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,165,80,0.2); }
.roadmap-milestone.next .rm-tool:hover { background: rgba(232,153,35,0.08); border-color: var(--amber); color: #8a5712; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(232,153,35,0.2); }
.roadmap-milestone.future .rm-tool:hover { background: rgba(107,70,193,0.08); border-color: var(--violet); color: var(--violet); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(107,70,193,0.2); }

/* ========== SLIDE: SKILLS ========== */
.slide-skills { background: linear-gradient(180deg, var(--bg) 0%, #fff 100%); }
.skills-content { width: 100%; max-width: 1400px; }
.skills-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.25em; color: var(--green); text-transform: uppercase; margin-bottom: 16px; text-align: center; }
.skills-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(36px,4.5vw,60px); text-align: center; margin-bottom: 12px; line-height: 1.1; color: var(--navy); letter-spacing: -0.02em; }
.skills-h em { color: var(--green); font-style: italic; }
.skills-sub { text-align: center; font-size: 15px; color: var(--ink-soft); margin-bottom: 40px; font-style: italic; }
.skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.skill-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 24px 22px; cursor: none; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.skill-card:hover { transform: translateY(-6px); }
.skill-card.tech { border-top: 4px solid var(--green); }
.skill-card.tech:hover { background: linear-gradient(135deg, rgba(0,165,80,0.12) 0%, rgba(52,199,122,0.06) 100%); border-color: rgba(0,165,80,0.4); box-shadow: 0 20px 50px rgba(0,165,80,0.25), 0 8px 16px rgba(0,165,80,0.15); }
.skill-card.method { border-top: 4px solid var(--violet); }
.skill-card.method:hover { background: linear-gradient(135deg, rgba(107,70,193,0.12) 0%, rgba(107,70,193,0.06) 100%); border-color: rgba(107,70,193,0.4); box-shadow: 0 20px 50px rgba(107,70,193,0.25), 0 8px 16px rgba(107,70,193,0.15); }
.skill-card.soft { border-top: 4px solid var(--amber); }
.skill-card.soft:hover { background: linear-gradient(135deg, rgba(232,153,35,0.12) 0%, rgba(232,153,35,0.06) 100%); border-color: rgba(232,153,35,0.4); box-shadow: 0 20px 50px rgba(232,153,35,0.25), 0 8px 16px rgba(232,153,35,0.15); }
.skill-icon { width: 48px; height: 48px; border-radius: 10px; display: grid; place-items: center; margin-bottom: 14px; font-size: 26px; }
.skill-card.tech .skill-icon { background: rgba(0,165,80,0.1); }
.skill-card.method .skill-icon { background: rgba(107,70,193,0.1); }
.skill-card.soft .skill-icon { background: rgba(232,153,35,0.1); }
.skill-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
.skill-card.tech .skill-label { color: var(--green-deep); }
.skill-card.method .skill-label { color: var(--violet); }
.skill-card.soft .skill-label { color: #b67414; }
.skill-title { font-family: var(--font-serif); font-weight: 700; font-size: 20px; color: var(--navy); margin-bottom: 14px; line-height: 1.2; }
.skill-list { list-style: none; padding: 0; }
.skill-list li { font-size: 13px; color: var(--ink-soft); line-height: 1.6; padding: 6px 0; border-bottom: 1px solid var(--line-soft); display: flex; align-items: flex-start; gap: 10px; }
.skill-list li:last-child { border-bottom: none; }
.skill-list li strong { color: var(--navy); font-weight: 600; }
.skill-bullet { font-family: var(--font-mono); font-size: 11px; flex-shrink: 0; margin-top: 2px; font-weight: bold; }
.skill-card.tech .skill-bullet { color: var(--green); }
.skill-card.method .skill-bullet { color: var(--violet); }
.skill-card.soft .skill-bullet { color: var(--amber); }
.skills-quote { margin-top: 32px; text-align: center; font-family: var(--font-serif); font-style: italic; font-size: 18px; color: var(--ink-soft); max-width: 800px; margin: 32px auto 0; }
.skills-quote em { color: var(--green); font-style: normal; font-weight: 600; }

/* ========== SLIDE: CALLBACK ========== */
.slide-callback { background: radial-gradient(ellipse at center, #002a54 0%, #001a38 100%); color: #fff; }
.callback-content { text-align: center; max-width: 1000px; }
.callback-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.3em; color: var(--green-soft); text-transform: uppercase; margin-bottom: 32px; }
.callback-time { font-family: var(--font-mono); font-size: 18px; letter-spacing: 0.4em; color: var(--green-soft); margin-bottom: 40px; }
.callback-h { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: clamp(28px,3.5vw,44px); line-height: 1.4; color: rgba(255,255,255,0.95); margin-bottom: 50px; }
.callback-h em { color: var(--green-soft); font-style: normal; font-weight: 700; }
.callback-resolution { font-family: var(--font-serif); font-size: 22px; font-style: italic; color: rgba(255,255,255,0.75); line-height: 1.6; max-width: 800px; margin: 0 auto; }
.callback-resolution strong { color: var(--green-soft); font-weight: 700; font-style: normal; }

/* ========== SLIDE: FINAL (ultra-simple, guaranteed to display) ========== */
.slide-final {
  background: linear-gradient(135deg, #002a54 0%, #0a3d6b 50%, #007a3a 100%);
  color: #fff;
}
.final-content {
  text-align: center;
  max-width: 1200px;
  width: 100%;
  padding: 20px;
}
.final-eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
  margin-bottom: 36px;
}
.final-h {

  font-weight: 900;
  font-size: clamp(32px,5vw,72px);
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
  color: #fff;
}
.final-h em {
  color: var(--green-soft);
  font-style: italic;
}
.final-sub {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(15px,1.5vw,20px);
  color: rgba(255,255,255,0.9);
  margin-bottom: 50px;
  line-height: 1.5;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}
.final-meta {
  display: flex;
  justify-content: center;
  gap: 50px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
  flex-wrap: wrap;
}
.final-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
}
.final-meta-val {
  color: #fff;
  font-weight: 600;
  font-size: 13px;
}

/* ========== SLIDE: Q&A ========== */
.slide-qa { background: var(--bg); }
.qa-content { text-align: center; }
.qa-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(60px,10vw,160px); line-height: 0.95; background: linear-gradient(135deg, var(--green) 0%, var(--navy) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.04em; margin-bottom: 32px; }
.qa-sub { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.4em; color: var(--ink-muted); text-transform: uppercase; }
.qa-cursor { display: inline-block; width: 12px; height: 24px; background: var(--green); margin-left: 6px; vertical-align: middle; animation: blinkCursor 0.8s step-end infinite; }

/* ========== RESPONSIVE ========== */
@media (max-width: 1100px) {
  .slide-inner { padding: 90px 30px 100px; }
  .toc-grid { grid-template-columns: repeat(2, 1fr); }
  .skills-grid { grid-template-columns: 1fr; }
  .flip-cards { grid-template-columns: repeat(2, 1fr); }
  .flip-card { height: 420px; }
  .title-universities { gap: 24px; }
  .title-uni-logo img { height: 36px; max-width: 160px; }
  .roadmap-jump-note { grid-template-columns: 1fr; gap: 12px; text-align: center; }
  .roadmap-jump-icon { margin: 0 auto; }
  .problematique-pillars { grid-template-columns: 1fr; }
  .journey-track { grid-template-columns: 1fr; gap: 20px; }
  .journey-arrow { display: none; }
  .agile-banner { grid-template-columns: 1fr; gap: 14px; }
  .roi-banner { grid-template-columns: 1fr; gap: 16px; text-align: center; }
  .roi-stat { text-align: center; }
  .discovery-content { grid-template-columns: 1fr; gap: 30px; }
  .metaphor-row { grid-template-columns: repeat(2, 1fr); }
  .metaphor-card .metaphor-arrow { display: none; }
  .roadmap-grid { grid-template-columns: 1fr; }
  .roadmap-grid::before { display: none; }
  .comparison-content { grid-template-columns: 1fr; height: auto; }
  .comp-vs { display: none; }
  .title-meta-block { border-left: none; border-top: 2px solid var(--line); padding-top: 16px; margin-top: 16px; }
  .title-meta-block:first-child { border-top: none; padding-top: 0; margin-top: 0; }
  .floating-logos { display: none; }
}
</style>

// ========== HOOKS ==========
const useTilt = (max = 8) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let raf;
    const onMove = (e) => {
      const rect = el.getBoundingClientRect();
      const cx = rect.width / 2, cy = rect.height / 2;
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const rx = ((y - cy) / cy) * -max;
      const ry = ((x - cx) / cx) * max;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        el.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg)`;
      });
    };
    const onLeave = () => {
      cancelAnimationFrame(raf);
      el.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
    };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
      cancelAnimationFrame(raf);
    };
  }, [max]);
  return ref;
};

const TiltCard = ({ className, children, max=8, ...rest }) => {
  const ref = useTilt(max);
  return <div className={className} ref={ref} {...rest}>{children}</div>;
};

const CustomCursor = () => {
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  useEffect(() => {
    const dot = dotRef.current, ring = ringRef.current;
    if (!dot || !ring) return;
    let mx = 0, my = 0, rx = 0, ry = 0, raf;
    const onMove = (e) => {
      mx = e.clientX; my = e.clientY;
      dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
      const el = document.elementFromPoint(mx, my);
      const isHover = el && el.closest('button, .toc-item, .skill-card, .flip-card, .journey-phase, .metaphor-card, .cockpit-tab, .cockpit-screen, .nav-btn, .chapter-marker, .heatmap, .agile-banner, .roi-banner, .roadmap-card, a');
      if (isHover) { ring.classList.add('hover'); dot.classList.add('hover'); }
      else { ring.classList.remove('hover'); dot.classList.remove('hover'); }
    };
    const animate = () => {
      rx += (mx - rx) * 0.18;
      ry += (my - ry) * 0.18;
      ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(animate);
    };
    animate();
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
  }, []);
  return <><div className="cursor-ring" ref={ringRef}/><div className="cursor-dot" ref={dotRef}/></>;
};

const AnimatedCounter = ({ target, duration = 2200, active = true }) => {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!active) { setVal(0); return; }
    let start = null, frame;
    const ease = t => 1 - Math.pow(1 - t, 3);
    const step = ts => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      setVal(Math.floor(target * ease(progress)));
      if (progress < 1) frame = requestAnimationFrame(step);
    };
    frame = requestAnimationFrame(step);
    return () => cancelAnimationFrame(frame);
  }, [target, duration, active]);
  return <span>{val.toLocaleString('fr-FR')}</span>;
};

const App = () => {
  const [idx, setIdx] = useState(0);
  const [counterPulse, setCounterPulse] = useState(false);
  const total = SLIDES.length;
  const go = useCallback((n) => {
    if (n < 0) n = 0;
    if (n >= total) n = total - 1;
    setIdx(n);
    setCounterPulse(true);
    setTimeout(() => setCounterPulse(false), 600);
  }, [total]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); go(idx + 1); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(idx - 1); }
      else if (e.key === 'Home') { e.preventDefault(); go(0); }
      else if (e.key === 'End') { e.preventDefault(); go(total - 1); }
      else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      } else if (/^[0-9]$/.test(e.key)) {
        const n = parseInt(e.key, 10);
        if (n === 0) go(9);
        else if (n >= 1 && n <= total) go(n - 1);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [idx, total, go]);

  const progress = ((idx + 1) / total) * 100;
  const cur = SLIDES[idx];
  const isDark = cur.dark;

  return (
    <>
      <CustomCursor/>
      <div className="particle-field" aria-hidden="true">
        <div className="particle"/>
        <div className="particle"/>
        <div className="particle"/>
        <div className="particle"/>
        <div className="particle"/>
        <div className="particle"/>
        <div className="particle"/>
        <div className="particle"/>
      </div>
      <div className="progress-track"><div className="progress-fill" style={{width: `${progress}%`}}/></div>
      <div className={`slide-counter-badge ${isDark ? 'dark' : ''} ${counterPulse ? 'changed' : ''}`}>
        <div className="counter-num">{String(idx + 1).padStart(2, '0')}</div>
        <div className="counter-divider"/>
        <div className="counter-info">
          <div className="counter-of">{String(idx + 1).padStart(2, '0')} <strong>OF</strong> {String(total).padStart(2, '0')}</div>
          <div className="counter-chapter">{cur.chapter}</div>
        </div>
      </div>
      <div className={`topbar ${isDark ? 'dark' : ''}`}>
        <div className="topbar-brand"><div className="brand-mark"/>YASSINE.KHELIFI / PFE-DEFENSE</div>
        <div className="topbar-meta">{cur.label}</div>
      </div>
      <div className="deck">
        {SLIDES.map((s, i) => {
          const C = s.comp;
          const isActive = i === idx;
          return <div key={s.id} className={`slide ${s.cls} ${isActive ? 'active' : ''}`}><C active={isActive}/></div>;
        })}
      </div>
      <div className="kbd-hint" style={{color: isDark ? 'rgba(255,255,255,0.4)' : 'var(--ink-muted)'}}>
        <div><span className="kbd">←</span> <span className="kbd">→</span> navigate</div>
        <div><span className="kbd">F</span> fullscreen · <span className="kbd">1-9</span> jump</div>
      </div>
      <div className={`chapter-markers ${isDark ? 'dark' : ''}`}>
        {SLIDES.map((s, i) => <button key={s.id} className={`chapter-marker ${i === idx ? 'active' : ''}`} onClick={() => go(i)} title={`${i+1}. ${s.label}`}/>)}
      </div>
      <div className="nav-controls">
        <button className="nav-btn" onClick={() => go(idx - 1)} disabled={idx === 0} title="Previous (←)">‹</button>
        <button className="nav-btn" onClick={() => go(idx + 1)} disabled={idx === total - 1} title="Next (→)">›</button>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
