<style>
:root {
  --navy: #002A54; --navy-deep: #001A38; --navy-soft: #0a3d6b;
  --green: #00A550; --green-deep: #007a3a; --green-soft: #34c77a;
  --bg: #F4F7F6; --bg-dark: #001626;
  --ink: #0d1b2a; --ink-soft: #3a4a5c; --ink-muted: #6b7a8c;
  --line: #d8e0e6; --line-soft: #e8edf1;
  --amber: #E89923; --amber-glow: #FFB444;
  --crimson: #C0392B; --violet: #6B46C1;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --font-serif: 'Playfair Display', Georgia, serif;
  --shadow-md: 0 4px 16px rgba(0,42,84,0.08);
  --shadow-lg: 0 16px 48px rgba(0,42,84,0.12);
  --shadow-xl: 0 30px 80px rgba(0,42,84,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font-sans); background: var(--bg); color: var(--ink); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh; width: 100vw; cursor: none; }
#root { width: 100vw; height: 100vh; position: relative; }

/* ========== CURSOR ========== */
.cursor-dot { position: fixed; width: 8px; height: 8px; background: var(--green); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.15s, height 0.15s; mix-blend-mode: difference; }
.cursor-ring { position: fixed; width: 36px; height: 36px; border: 1.5px solid var(--green); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: width 0.25s, height 0.25s; }
.cursor-ring.hover { width: 60px; height: 60px; background: rgba(0,165,80,0.1); border-width: 2px; }
.cursor-dot.hover { width: 0; height: 0; }
@media (hover: none) { .cursor-dot, .cursor-ring { display: none; } html, body { cursor: auto; } }

/* ========== DECK ========== */
.deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.slide { position: absolute; inset: 0; opacity: 0; visibility: hidden; transition: opacity 0.55s ease, visibility 0s linear 0.55s; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.slide.active { opacity: 1; visibility: visible; z-index: 5; transition: opacity 0.55s ease, visibility 0s linear 0s; }
.slide-inner { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 90px 60px 110px; position: relative; }
/* For tall content, allow flex-start alignment */
.slide-inner.tall { align-items: flex-start; padding-top: 100px; }

/* ========== TOPBAR ========== */
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: rgba(244,247,246,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line-soft); pointer-events: none; transition: background 0.4s; }
.topbar.dark { background: rgba(0,22,38,0.85); border-bottom-color: rgba(255,255,255,0.08); }
.topbar-brand { display: flex; align-items: center; gap: 12px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--navy); letter-spacing: 0.05em; }
.topbar.dark .topbar-brand { color: rgba(255,255,255,0.85); }
.brand-mark { width: 24px; height: 24px; background: var(--navy); border-radius: 4px; display: grid; place-items: center; }
.topbar.dark .brand-mark { background: rgba(255,255,255,0.15); }
.brand-mark::before { content: ''; width: 8px; height: 8px; background: var(--green); border-radius: 1px; transform: rotate(45deg); }
.topbar-meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; color: var(--ink-muted); text-transform: uppercase; }
.topbar.dark .topbar-meta { color: rgba(255,255,255,0.5); }

.progress-track { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: rgba(0,42,84,0.08); z-index: 99; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--navy), var(--green)); transition: width 0.5s ease; }

/* ========== NAV ========== */
.chapter-markers { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); padding: 10px 16px; border-radius: 100px; border: 1px solid var(--line); box-shadow: var(--shadow-md); }
.chapter-markers.dark { background: rgba(0,22,38,0.85); border-color: rgba(255,255,255,0.1); }
.chapter-marker { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,42,84,0.2); cursor: none; transition: all 0.3s; position: relative; border: none; padding: 0; }
.chapter-markers.dark .chapter-marker { background: rgba(255,255,255,0.25); }
.chapter-marker:hover { background: var(--navy); transform: scale(1.4); }
.chapter-marker.active { background: var(--green); width: 32px; border-radius: 5px; box-shadow: 0 0 12px rgba(0,165,80,0.5); }
.nav-controls { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; gap: 8px; }
.nav-btn { width: 44px; height: 44px; border-radius: 50%; background: #fff; border: 1px solid var(--line); color: var(--navy); font-size: 18px; cursor: none; transition: all 0.25s; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(0,42,84,0.06); }
.nav-btn:hover { background: var(--green); border-color: var(--green); color: #fff; transform: scale(1.1); }
.nav-btn:disabled { opacity: 0.4; }
.kbd-hint { position: fixed; bottom: 80px; right: 24px; z-index: 99; font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); letter-spacing: 0.1em; text-align: right; pointer-events: none; line-height: 1.8; }
.kbd { display: inline-block; background: #fff; border: 1px solid var(--line); border-radius: 3px; padding: 1px 6px; margin: 0 2px; color: var(--navy); font-weight: 600; }

/* ========== KEYFRAMES ========== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes gridDrift { from { background-position: 0 0; } to { background-position: 60px 60px; } }
@keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,-40px) scale(1.1); } }
@keyframes blink { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.8); } }
@keyframes counterIn { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
@keyframes floatLogo { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-15px) rotate(2deg); } }
@keyframes peakPulse { 0%,100% { box-shadow: 0 0 20px rgba(232,153,35,0.4); } 50% { box-shadow: 0 0 35px rgba(232,153,35,0.8); } }
@keyframes blinkCursor { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
@keyframes vsRotate { 0%,100% { transform: translate(-50%,-50%) rotate(-3deg); } 50% { transform: translate(-50%,-50%) rotate(3deg); } }
@keyframes flipPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes roiShine { 0% { left: -100%; } 60%,100% { left: 200%; } }
@keyframes dialogueIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
@keyframes arrowSlide { 0% { left: -25px; } 100% { left: 100%; } }

/* ========== SLIDE: COLD ========== */
.slide-cold { background: radial-gradient(ellipse at center, #002a54 0%, #001a38 60%, #000a14 100%); color: #fff; }
.cold-content { text-align: center; position: relative; z-index: 2; }
.cold-time { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.4em; color: var(--green-soft); margin-bottom: 32px; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; }
.cold-counter { font-family: var(--font-serif); font-weight: 900; font-size: clamp(80px, 18vw, 280px); line-height: 0.9; color: #fff; letter-spacing: -0.04em; opacity: 0; animation: counterIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards; text-shadow: 0 0 80px rgba(0,165,80,0.4); }
.cold-question { font-family: var(--font-serif); font-style: italic; font-size: clamp(20px,2.5vw,30px); color: rgba(255,255,255,0.85); margin-top: 40px; max-width: 900px; margin-left: auto; margin-right: auto; line-height: 1.5; opacity: 0; animation: fadeUp 1s ease 1.8s forwards; }
.cold-question strong { color: var(--amber-glow); font-style: normal; }
.cold-sub { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.3em; color: rgba(255,255,255,0.5); margin-top: 60px; opacity: 0; animation: fadeUp 1s ease 2.6s forwards; text-transform: uppercase; }
.alert-grid { position: absolute; inset: 0; pointer-events: none; opacity: 0.3; }
.alert-dot { position: absolute; width: 4px; height: 4px; background: var(--crimson); border-radius: 50%; animation: blink var(--blink-dur,2s) ease-in-out infinite; animation-delay: var(--blink-delay,0s); box-shadow: 0 0 8px var(--crimson); }

/* ========== SLIDE: TITLE ========== */
.slide-title { background: var(--bg); }
.title-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,42,84,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,42,84,0.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; animation: gridDrift 30s linear infinite; }
.title-orb { position: absolute; width: 500px; height: 500px; border-radius: 50%; filter: blur(100px); opacity: 0.18; pointer-events: none; animation: orbFloat 20s ease-in-out infinite; }
.title-orb.green { background: var(--green); top: -150px; right: -100px; }
.title-orb.navy { background: var(--navy); bottom: -150px; left: -100px; animation-delay: -10s; }
.floating-logos { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
.float-logo { position: absolute; width: 60px; height: 60px; background: #fff; border-radius: 14px; display: grid; place-items: center; box-shadow: var(--shadow-md); animation: floatLogo 6s ease-in-out infinite; border: 1px solid var(--line); }
.float-logo svg { width: 32px; height: 32px; }
.float-logo.l1 { top: 18%; left: 8%; }
.float-logo.l2 { top: 28%; right: 10%; animation-delay: -2s; }
.float-logo.l3 { bottom: 22%; left: 14%; animation-delay: -3s; }
.float-logo.l4 { bottom: 18%; right: 8%; animation-delay: -1s; }
.float-logo.l5 { top: 52%; left: 4%; animation-delay: -4s; }
.float-logo.l6 { top: 60%; right: 4%; animation-delay: -5s; }
.title-content { position: relative; z-index: 3; text-align: center; max-width: 1200px; }
.title-tag { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; color: var(--green-deep); background: rgba(0,165,80,0.08); border: 1px solid rgba(0,165,80,0.25); padding: 8px 16px; border-radius: 100px; margin-bottom: 36px; }
.title-tag-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulseDot 2s ease-in-out infinite; }
.title-h { font-family: var(--font-serif); font-weight: 900; font-size: clamp(48px,7vw,110px); line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 24px; color: var(--navy); }
.title-h-em { background: linear-gradient(135deg, var(--green), var(--green-deep)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-style: italic; }
.title-sub { font-size: clamp(16px,1.4vw,22px); color: var(--ink-soft); max-width: 800px; margin: 0 auto 60px; line-height: 1.6; }
.title-meta { display: flex; justify-content: center; align-items: stretch; flex-wrap: wrap; }
.title-meta-block { text-align: left; padding: 0 28px; border-left: 2px solid var(--line); }
.title-meta-block:first-child { border-left: none; }
.title-meta-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--ink-muted); text-transform: uppercase; margin-bottom: 8px; }
.title-meta-value { font-size: 18px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.title-meta-extra { font-size: 13px; color: var(--ink-soft); font-family: var(--font-mono); }

/* University logos in title meta */
.title-universities { display: flex; justify-content: center; align-items: center; gap: 60px; margin-top: 50px; flex-wrap: wrap; }
.title-uni-logo { background: #fff; padding: 14px 22px; border-radius: 12px; box-shadow: var(--shadow-md); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; transition: transform 0.3s, box-shadow 0.3s; }
.title-uni-logo:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
.title-uni-logo img { height: 50px; width: auto; max-width: 220px; object-fit: contain; display: block; }
.title-uni-cross { font-family: var(--font-serif); font-weight: 900; font-size: 32px; color: var(--green); }

/* ========== SLIDE: TOC ========== */
.slide-toc { background: linear-gradient(180deg, #fff 0%, var(--bg) 100%); }
.toc-content { width: 100%; max-width: 1400px; }
.toc-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.25em; color: var(--green); text-transform: uppercase; margin-bottom: 16px; text-align: center; }
.toc-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(36px,4.5vw,60px); text-align: center; margin-bottom: 12px; line-height: 1.1; color: var(--navy); letter-spacing: -0.02em; }
.toc-h em { color: var(--green); font-style: italic; }
.toc-sub { text-align: center; font-size: 16px; color: var(--ink-soft); margin-bottom: 50px; font-style: italic; }
.toc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.toc-item { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 22px 20px; cursor: none; transition: box-shadow 0.3s, border-color 0.3s, transform 0.3s; text-align: left; display: flex; flex-direction: column; gap: 12px; min-height: 170px; }
.toc-item:hover { box-shadow: var(--shadow-xl); border-color: var(--green); transform: translateY(-4px); }
.toc-item-num { font-family: var(--font-serif); font-weight: 900; font-size: 36px; line-height: 1; background: linear-gradient(135deg, var(--green), var(--green-deep)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.toc-item-chapter { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; color: var(--ink-muted); text-transform: uppercase; font-weight: 600; }
.toc-item-title { font-family: var(--font-serif); font-weight: 700; font-size: 17px; color: var(--navy); line-height: 1.25; margin-top: auto; }
.toc-item-time { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); letter-spacing: 0.15em; margin-top: 4px; }

/* ========== SLIDE: PROBLEMATIQUE ========== */
.slide-problematique { background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 50%, var(--navy-soft) 100%); color: #fff; position: relative; overflow: hidden; }
.problematique-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; animation: gridDrift 30s linear infinite; z-index: 1; }
.problematique-orb { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.25; pointer-events: none; z-index: 1; }
.problematique-orb.green { background: var(--green); top: -200px; right: -150px; animation: orbFloat 18s ease-in-out infinite; }
.problematique-orb.amber { background: var(--amber); bottom: -200px; left: -150px; animation: orbFloat 18s ease-in-out infinite -9s; }
.problematique-content { position: relative; z-index: 3; text-align: center; max-width: 1200px; width: 100%; }
.problematique-eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.3em; color: var(--green-soft); background: rgba(0,165,80,0.1); border: 1px solid rgba(52,199,122,0.3); padding: 8px 18px; border-radius: 100px; margin-bottom: 36px; text-transform: uppercase; font-weight: 600; }
.problematique-eyebrow-dot { width: 6px; height: 6px; background: var(--green-soft); border-radius: 50%; animation: pulseDot 2s ease-in-out infinite; box-shadow: 0 0 8px var(--green-soft); }
.problematique-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(28px,3.5vw,48px); line-height: 1.4; color: #fff; letter-spacing: -0.01em; max-width: 1100px; margin: 0 auto 50px; }
.problematique-h em { color: var(--green-soft); font-style: italic; font-weight: 700; }
.problematique-h strong { color: var(--amber-glow); font-weight: 700; }
.problematique-quote-marks { font-family: var(--font-serif); font-size: 120px; color: rgba(52,199,122,0.2); line-height: 0.5; margin-bottom: -20px; font-weight: 900; user-select: none; }
.problematique-pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; max-width: 1000px; margin-left: auto; margin-right: auto; }
.problematique-pillar { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 22px 18px; backdrop-filter: blur(8px); cursor: none; transition: all 0.3s; }
.problematique-pillar:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); transform: translateY(-4px); }
.problematique-pillar-icon { font-size: 28px; margin-bottom: 12px; display: block; }
.problematique-pillar-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--green-soft); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
.problematique-pillar-title { font-family: var(--font-serif); font-weight: 700; font-size: 16px; color: #fff; line-height: 1.3; }
.slide-stage { background: linear-gradient(180deg, #fff 0%, var(--bg) 100%); }
.stage-content { width: 100%; max-width: 1500px; text-align: center; }
.stage-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.25em; color: var(--green); text-transform: uppercase; margin-bottom: 24px; }
.stage-h { font-family: var(--font-serif); font-weight: 700; font-size: clamp(32px,4vw,56px); line-height: 1.05; color: var(--navy); margin-bottom: 36px; letter-spacing: -0.02em; }
.stage-h em { color: var(--green); font-style: italic; }
.flip-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; perspective: 1500px; max-width: 1300px; margin: 0 auto; }
.flip-card { height: 460px; min-height: 460px; max-height: 460px; position: relative; cursor: none; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4,0,0.2,1); }
.flip-card.flipped { transform: rotateY(180deg); }
.flip-card-side { position: absolute; inset: 0; border-radius: 16px; overflow: hidden; -webkit-backface-visibility: hidden; backface-visibility: hidden; border: 1px solid var(--line); box-shadow: var(--shadow-md); display: flex; flex-direction: column; }
.flip-card-front { background: #fff; position: relative; }
.flip-card-front-bg { position: absolute; inset: 0; z-index: 0; }
.flip-card-front-bg img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
.flip-card-front-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,42,84,0) 30%, rgba(0,42,84,0.85) 100%); z-index: 1; }
.flip-card-front-content { position: relative; z-index: 2; padding: 28px 24px; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
.flip-card-front-name { color: #fff; font-family: var(--font-serif); font-weight: 700; font-size: 30px; text-align: left; text-shadow: 0 2px 16px rgba(0,0,0,0.5); margin-bottom: 8px; line-height: 1.1; }
.flip-card-front-tag { color: rgba(255,255,255,0.9); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; text-align: left; }
.flip-hint { position: absolute; top: 16px; right: 16px; background: rgba(0,165,80,0.95); color: #fff; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; padding: 6px 10px; border-radius: 100px; z-index: 3; font-weight: 600; text-transform: uppercase; box-shadow: 0 4px 12px rgba(0,165,80,0.4); animation: flipPulse 2s ease-in-out infinite; }
.flip-card-back { transform: rotateY(180deg); background: linear-gradient(135deg, var(--navy), var(--navy-soft)); color: #fff; padding: 28px 24px; text-align: left; justify-content: space-between; }
.flip-card-back.green-bg { background: linear-gradient(135deg, var(--green-deep), var(--green)); }
.flip-card-back.amber-bg { background: linear-gradient(135deg, #b67414, var(--amber)); }
.flip-card-back.violet-bg { background: linear-gradient(135deg, #4a2d8c, var(--violet)); }
.flip-back-num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 12px; }
.flip-back-name { font-family: var(--font-serif); font-weight: 700; font-size: 26px; color: #fff; margin-bottom: 16px; line-height: 1.15; }
.flip-back-desc { font-size: 14px; color: rgba(255,255,255,0.92); line-height: 1.6; margin-bottom: 22px; flex: 1; }
.flip-back-desc em { color: #fff; font-style: italic; }
.flip-back-stat { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 14px; }
.flip-back-stat-num { font-family: var(--font-serif); font-weight: 900; font-size: 30px; color: var(--green-soft); letter-spacing: -0.02em; line-height: 1; }
.flip-card-back.green-bg .flip-back-stat-num,
.flip-card-back.amber-bg .flip-back-stat-num,
.flip-card-back.violet-bg .flip-back-stat-num { color: #fff; }

// ========== HOOKS ==========
const useTilt = (max = 8) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let raf;
    const onMove = (e) => {
      const rect = el.getBoundingClientRect();
      const cx = rect.width / 2, cy = rect.height / 2;
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const rx = ((y - cy) / cy) * -max;
      const ry = ((x - cx) / cx) * max;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        el.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg)`;
      });
    };
    const onLeave = () => {
      cancelAnimationFrame(raf);
      el.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
    };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
      cancelAnimationFrame(raf);
    };
  }, [max]);
  return ref;
};

const TiltCard = ({ className, children, max=8, ...rest }) => {
  const ref = useTilt(max);
  return <div className={className} ref={ref} {...rest}>{children}</div>;
};

const CustomCursor = () => {
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  useEffect(() => {
    const dot = dotRef.current, ring = ringRef.current;
    if (!dot || !ring) return;
    let mx = 0, my = 0, rx = 0, ry = 0, raf;
    const onMove = (e) => {
      mx = e.clientX; my = e.clientY;
      dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
      const el = document.elementFromPoint(mx, my);
      const isHover = el && el.closest('button, .toc-item, .skill-card, .flip-card, .journey-phase, .metaphor-card, .cockpit-tab, .cockpit-screen, .nav-btn, .chapter-marker, .heatmap, .agile-banner, .roi-banner, .roadmap-card, a');
      if (isHover) { ring.classList.add('hover'); dot.classList.add('hover'); }
      else { ring.classList.remove('hover'); dot.classList.remove('hover'); }
    };
    const animate = () => {
      rx += (mx - rx) * 0.18;
      ry += (my - ry) * 0.18;
      ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(animate);
    };
    animate();
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
  }, []);
  return <><div className="cursor-ring" ref={ringRef}/><div className="cursor-dot" ref={dotRef}/></>;
};

const AnimatedCounter = ({ target, duration = 2200, active = true }) => {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!active) { setVal(0); return; }
    let start = null, frame;
    const ease = t => 1 - Math.pow(1 - t, 3);
    const step = ts => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      setVal(Math.floor(target * ease(progress)));
      if (progress < 1) frame = requestAnimationFrame(step);
    };
    frame = requestAnimationFrame(step);
    return () => cancelAnimationFrame(frame);
  }, [target, duration, active]);
  return <span>{val.toLocaleString('fr-FR')}</span>;
};

};

const SLIDES = [
  { id: 'cold',       cls: 'slide-cold',       comp: SlideCold,       label: 'Cold Open',         chapter: 'Hook',         time: '90s',  dark: true  },
  { id: 'title',      cls: 'slide-title',      comp: SlideTitle,      label: 'Title',             chapter: 'Identity',     time: '30s',  dark: false },
  { id: 'toc',        cls: 'slide-toc',        comp: SlideTOC,        label: 'Table of Contents', chapter: 'Roadmap',      time: '20s',  dark: false },
  { id: 'problematique', cls: 'slide-problematique', comp: SlideProblematique, label: 'Problématique', chapter: 'Question',  time: '40s',  dark: true  },
  { id: 'stage',      cls: 'slide-stage',      comp: SlideStage,      label: 'The Stage',         chapter: 'Chapter I',    time: '90s',  dark: false },
  { id: 'journey',    cls: 'slide-journey',    comp: SlideJourney,    label: 'Journey + Agile',   chapter: 'Chapter II',   time: '110s', dark: false },
  { id: 'problem',    cls: 'slide-problem',    comp: SlideProblem,    label: 'The Problem',       chapter: 'Chapter III',  time: '60s',  dark: true  },
  { id: 'metaphor',   cls: 'slide-metaphor',   comp: SlideMetaphor,   label: 'Pipeline + ROI',    chapter: 'Chapter IV',   time: '120s', dark: false },
  { id: 'discovery',  cls: 'slide-discovery',  comp: SlideDiscovery,  label: 'The Finding',       chapter: 'Chapter V',    time: '80s',  dark: false },
  { id: 'comparison', cls: 'slide-comparison', comp: SlideComparison, label: 'Before / After',    chapter: 'Bridge',       time: '60s',  dark: false },
  { id: 'cockpit',    cls: 'slide-cockpit',    comp: SlideCockpit,    label: 'The Cockpit',       chapter: 'Chapter VI',   time: '110s', dark: false },
  { id: 'roadmap',    cls: 'slide-roadmap',    comp: SlideRoadmap,    label: 'Roadmap',           chapter: 'Chapter VII',  time: '60s',  dark: false },
  { id: 'skills',     cls: 'slide-skills',     comp: SlideSkills,     label: 'Skills Acquired',   chapter: 'Chapter IX',   time: '60s',  dark: false },
  { id: 'callback',   cls: 'slide-callback',   comp: SlideCallback,   label: 'Callback',          chapter: 'Chapter VIII', time: '30s',  dark: true  },
  { id: 'final',      cls: 'slide-final',      comp: SlideFinal,      label: 'Closing',           chapter: 'Closing',      time: '25s',  dark: true  },
  { id: 'qa',         cls: 'slide-qa',         comp: SlideQA,         label: 'Q&A',               chapter: 'Q&A',          time: '—',    dark: false }
];

const App = () => {
  const [idx, setIdx] = useState(0);
  const total = SLIDES.length;
  const go = useCallback((n) => {
    if (n < 0) n = 0;
    if (n >= total) n = total - 1;
    setIdx(n);
  }, [total]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); go(idx + 1); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(idx - 1); }
      else if (e.key === 'Home') { e.preventDefault(); go(0); }
      else if (e.key === 'End') { e.preventDefault(); go(total - 1); }
      else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      } else if (/^[0-9]$/.test(e.key)) {
        const n = parseInt(e.key, 10);
        if (n === 0) go(9);
        else if (n >= 1 && n <= total) go(n - 1);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [idx, total, go]);

  const progress = ((idx + 1) / total) * 100;
  const cur = SLIDES[idx];
  const isDark = cur.dark;

  return (
    <>
      <CustomCursor/>
      <div className="progress-track"><div className="progress-fill" style={{width: `${progress}%`}}/></div>
      <div className={`topbar ${isDark ? 'dark' : ''}`}>
        <div className="topbar-brand"><div className="brand-mark"/>YASSINE.KHELIFI / PFE-DEFENSE</div>
        <div className="topbar-meta">{String(idx + 1).padStart(2, '0')} / {String(total).padStart(2, '0')} · {cur.chapter} · {cur.time}</div>
      </div>
      <div className="deck">
        {SLIDES.map((s, i) => {
          const C = s.comp;
          const isActive = i === idx;
          return <div key={s.id} className={`slide ${s.cls} ${isActive ? 'active' : ''}`}><C active={isActive}/></div>;
        })}
      </div>
      <div className="kbd-hint" style={{color: isDark ? 'rgba(255,255,255,0.4)' : 'var(--ink-muted)'}}>
        <div><span className="kbd">←</span> <span className="kbd">→</span> navigate</div>
        <div><span className="kbd">F</span> fullscreen · <span className="kbd">1-9</span> jump</div>
      </div>
      <div className={`chapter-markers ${isDark ? 'dark' : ''}`}>
        {SLIDES.map((s, i) => <button key={s.id} className={`chapter-marker ${i === idx ? 'active' : ''}`} onClick={() => go(i)} title={s.label}/>)}
      </div>
      <div className="nav-controls">
        <button className="nav-btn" onClick={() => go(idx - 1)} disabled={idx === 0} title="Previous (←)">‹</button>
        <button className="nav-btn" onClick={() => go(idx + 1)} disabled={idx === total - 1} title="Next (→)">›</button>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
